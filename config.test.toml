# Committed test baseline. conftest points AppConfig at this so a bare
# `AppConfig()` in a test gets a complete, valid config it can override per-field
# (via env vars or constructor) without depending on a developer's local
# config.toml. Keyless and in-memory by default so unconfigured-path tests hold.

[llm]
provider = "openai"
api_key = ""
model = "test-model"

[llm.roles.domain_classifier]
model = "test-model"
temperature = 0.0
prompt = "test domain classifier prompt"

[llm.roles.dedup_judge]
model = "test-model"
temperature = 0.0
prompt = "test dedup judge prompt"

[llm.roles.rank_reranker]
model = "test-model"
temperature = 0.0
prompt = "test rank reranker prompt"

[llm.roles.feedback_summary]
model = "test-model"
temperature = 0.0
prompt = "test feedback summary prompt"

[embedding]
kind = "bge_small"
model = "BAAI/bge-small-en-v1.5"
dimensions = 384

[search]
engine = "frontier_native"
max_results_per_query = 20
rrf_k = 60
search_context_size = "medium"
reasoning_effort = "medium"
allowed_domains = []
instructions = "test search instructions"
prompt = "Find up to {max_results} results for: {query}"

[dedup]
auto_merge_threshold = 0.88
tiebreak_low_threshold = 0.75
block_window_days = 1

[rank]
top_n = 25
exploration_slots = 2
logistic_blender_min_labels = 50

[storage]
db_path = ":memory:"

[auth]
scheme = "local"
api_token = ""

[server]
host = "0.0.0.0"
port = 8080
scheduler_tick_seconds = 300

[logging]
level = "INFO"
format = "%(asctime)s %(levelname)-8s %(name)s: %(message)s"
