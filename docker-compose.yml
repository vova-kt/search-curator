# Thin UIs over one shared SQLite volume. Config comes from config.toml
# (copy config.example.toml -> config.toml), mounted read-only; env vars still
# override any value.
#
# Pick exactly ONE scheduler — server and bot both advance last_run_at, so
# running both against the same DB double-schedules. They live behind compose
# profiles to make the choice explicit and mutually exclusive:
#
#   docker compose --profile headless up   # server  + ui (read-only viewer)
#   docker compose --profile bot up         # bot     + ui (read-only viewer)
#
# `ui` has no profile, so it runs in either mode. Plain `docker compose up`
# starts only `ui` (no scheduler) — choose a profile to schedule runs.
services:
  server:
    profiles: ["headless"]
    build: .
    environment:
      STORAGE__DB_PATH: /data/events.db
    volumes:
      - ./config.toml:/app/config.toml:ro
      - events-data:/data
    restart: unless-stopped

  bot:
    profiles: ["bot"]
    build: .
    command: ["uv", "run", "events-curator-bot"]
    environment:
      STORAGE__DB_PATH: /data/events.db
    volumes:
      - ./config.toml:/app/config.toml:ro
      - events-data:/data
    restart: unless-stopped

  ui:
    build: .
    command:
      - uv
      - run
      - streamlit
      - run
      - src/events_curator/apps/streamlit_app/app.py
      - --server.port=8501
      - --server.address=0.0.0.0
    environment:
      STORAGE__DB_PATH: /data/events.db
    ports:
      - "8501:8501"
    volumes:
      - ./config.toml:/app/config.toml:ro
      - events-data:/data
    restart: unless-stopped

volumes:
  events-data:
