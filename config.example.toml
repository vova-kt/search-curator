# Copy to config.toml and fill in secrets. Every field below is REQUIRED. Tables map
# to the nested config groups in src/events_curator/config.py. Environment
# variables override any value, nested with the __ delimiter (e.g. LLM__API_KEY=...),
# which is how Docker/CI inject secrets on top of this file.
#

# --- LLM ---
# `model` here is the model the native web-search backend runs. The chat call
# sites (dedup judge, rank reranker, feedback summary) each run their own model,
# temperature, and system prompt under [llm.roles.<role>] below.
[llm]
provider = "openai"
api_key = ""
model = "gpt-4o-mini"

[llm.roles.dedup_judge]
model = "gpt-4o-mini"
temperature = 0.0
prompt = """You are a deduplication judge for search results. Two records are shown. Decide whether they describe the SAME real-world item (the same event, paper, listing, etc.) even if their titles, wording, or URLs differ. Reply with exactly 'yes' or 'no'."""

[llm.roles.rank_reranker]
model = "gpt-4o-mini"
temperature = 0.0
prompt = """You are a personalization reranker for a recurring web search. You are given the search's learned taste and a numbered list of candidate results. Order the candidates from best to worst fit for that taste. Reply with ONLY a JSON object {"ranking": [{"id": <candidate number>, "why": "<short reason>"}, ...]} — no prose, no code fences. Include every candidate number exactly once, best first."""

[llm.roles.feedback_summary]
model = "gpt-4o-mini"
temperature = 0.0
prompt = """You maintain a short natural-language description of what one recurring web search likes and dislikes. You are given the current description and one new like or dislike. Rewrite the description so it accounts for the new signal: keep it to a few sentences, concrete, and even-handed about likes and dislikes. Reply with ONLY the updated description — no preamble, no quotes."""

# --- Embeddings (dedup similarity, taste vectors) ---
[embedding]
kind = "bge_small"
model = "BAAI/bge-small-en-v1.5"
dimensions = 384

# --- Search ---
# `instructions` is the system prompt steering the native web-search backend; `prompt`
# is the per-query input prompt template, filled with the `{query}` and `{max_results}`
# placeholders per call. The typed fields of each result come from the `submit_results`
# function tool's schema (derived from ExtractedResult), so neither prompt need list them.
# `search_context_size` (low|medium|high) trades cost for recall; `reasoning_effort`
# (none|minimal|low|medium|high|xhigh) is the model's thinking budget; `allowed_domains`
# restricts web_search to an allow-list (empty = no restriction). Geographic bias is
# NOT config — it's the per-user `User.location` attribute, threaded in per run.
[search]
engine = "frontier_native"
max_results_per_query = 20
rrf_k = 60
search_context_size = "medium"
reasoning_effort = "medium"
allowed_domains = []
instructions = """You are a web research assistant. Use web search to find current, real results that satisfy the user's request, read the pages you find, and extract structured data. When you are done, call the `submit_results` tool exactly once with every result you found; do not reply in prose. Omit any result you cannot tie to a real, absolute http(s) URL."""
prompt = """Find up to {max_results} results for: {query}

Fill every field of each result that the source supports. For facts with no dedicated field, fill only the keys offered by the `attributes` object of the `submit_results` tool, each following its instruction; omit anything you cannot find."""

# `attributes` is the open-ended escape hatch for facts with no dedicated field, but the
# allowed keys are a closed, configured vocabulary so the model stops inventing its own.
# Each `[search.attributes.<key>]` carries an `instruction` (offered to the search model
# as that key's fill guidance) and an `emoji` (shown beside the value in the UI). Use
# lowercase snake_case keys. Swap this whole set to curate papers/jobs/listings instead
# of events — it's domain config, not code.
[search.attributes.organizer]
instruction = "Who runs or hosts the event"
emoji = "🏛️"

[search.attributes.genre]
instruction = "Music genre or event category"
emoji = "🎵"

[search.attributes.lineup]
instruction = "Headline acts or speakers, comma-separated"
emoji = "🎤"

# --- Dedup thresholds ---
[dedup]
auto_merge_threshold = 0.88
tiebreak_low_threshold = 0.75
block_window_days = 1

# --- Rank ---
[rank]
top_n = 25
exploration_slots = 2
logistic_blender_min_labels = 50

# --- Storage ---
[storage]
db_path = "./events.db"

# --- Auth (DB is multi-user; pick how callers are identified) ---
[auth]
scheme = "local"
api_token = ""

# --- Server / scheduler ---
[server]
host = "0.0.0.0"
port = 8080
scheduler_tick_seconds = 300

# --- Logging (baseline level at startup; the Streamlit console forces DEBUG) ---
[logging]
level = "INFO"
format = "%(asctime)s %(levelname)-8s %(name)s: %(message)s"
