# Logging configuration for ad-hoc scripts (pipelines/, evaluation/).
# sitecustomize.py loads this automatically at interpreter startup when the
# project root is on PYTHONPATH. The deployed apps configure logging through
# setup_logging() instead — see docs/logging.md for the why.

[loggers]
keys=root

[handlers]
keys=console

[formatters]
keys=standard

[logger_root]
level=INFO
handlers=console

[handler_console]
class=StreamHandler
formatter=standard
args=(sys.stderr,)

[formatter_standard]
format=%(asctime)s %(levelname)s %(name)s: %(message)s
